# External Secrets Operator config: how to reach AWS Secrets Manager.
# Auth is IRSA via the reflex-eso ServiceAccount (created by Terraform) —
# no AWS credentials stored in the cluster.
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: reflex-aws
spec:
  provider:
    aws:
      service: SecretsManager
      region: eu-west-3
      auth:
        jwt:
          serviceAccountRef:
            name: reflex-eso
