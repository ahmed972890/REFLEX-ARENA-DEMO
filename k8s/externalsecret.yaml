# Syncs the internal API token from AWS Secrets Manager into the k8s Secret
# `reflex-internal`, which both deployments consume. Rotate the value in
# Secrets Manager and it propagates within refreshInterval (then restart pods).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: reflex-internal
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: reflex-aws
    kind: SecretStore
  target:
    name: reflex-internal
    creationPolicy: Owner
  data:
    - secretKey: INTERNAL_API_TOKEN
      remoteRef:
        key: reflex/internal-api-token
