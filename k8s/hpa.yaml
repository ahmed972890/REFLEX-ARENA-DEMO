apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: reflex-backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: reflex-backend
  minReplicas: 2
  # Load-tested ceiling: 2×t3.small tops out at ~6 schedulable app pods
  # (11-pod ENI limit per node minus system pods). Raise together with node
  # capacity — bigger instances, more nodes, or VPC CNI prefix delegation.
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
  behavior:
    scaleUp: # react fast during the load-test demo
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 4
          periodSeconds: 15
      selectPolicy: Max
    scaleDown: # settle slowly to avoid flapping
      stabilizationWindowSeconds: 120
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: reflex-frontend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: reflex-frontend
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
